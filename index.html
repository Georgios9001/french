<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Français en 7 jours</title>
<style>
  :root{
    --bg:#F6F5F1; --ink:#1C1F2E; --muted:#6E7180; --line:#E5E4DD; --card:#FFFFFF;
    --bleu:#20408F; --bleu-dark:#172E68; --rouge:#D3323A; --blanc:#FFFFFF;
    --gold:#B07A1F; --vert:#1F7A4D;
    --radius:18px; --shadow:0 10px 30px rgba(28,31,46,.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);color:var(--ink);display:flex;justify-content:center;min-height:100dvh;
  }
  .app{width:100%;max-width:480px;display:flex;flex-direction:column;
       padding:14px 16px calc(16px + env(safe-area-inset-bottom))}

  header{display:flex;align-items:baseline;justify-content:space-between;gap:8px;padding:2px 2px 10px}
  .brand{font-size:1.02rem;font-weight:800;letter-spacing:-.02em}
  .brand em{font-style:normal;color:var(--bleu)}
  .brand .accent{color:var(--rouge)}
  .day-badge{font-size:.78rem;font-weight:700;color:var(--muted);white-space:nowrap}

  /* ---------- Menü / Navigation ---------- */
  .nav{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:10px}
  .nav-btn{
    flex:0 0 auto;display:flex;align-items:center;gap:5px;
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:99px;padding:8px 12px;font-size:.78rem;font-weight:800;cursor:pointer;
    white-space:nowrap;transition:transform .1s ease;
  }
  .nav-btn:active{transform:scale(.96)}
  .nav-btn .due-badge{
    background:var(--rouge);color:#fff;border-radius:99px;font-size:.62rem;
    padding:1px 6px;font-weight:800;
  }
  .nav-btn.active{background:var(--bleu);border-color:var(--bleu);color:#fff}
  .nav-btn.active .due-badge{background:#fff;color:var(--bleu)}
  .nav-btn.view-btn{border-style:dashed}

  /* Tricolor-Fortschrittsbalken */
  .progress-wrap{margin-bottom:6px}
  .progress-track{height:10px;border-radius:99px;background:#ECEBE4;overflow:hidden;border:1px solid var(--line)}
  .progress-fill{height:100%;width:0%;
    background:linear-gradient(90deg,var(--bleu) 0 33.3%,var(--blanc) 33.3% 66.6%,var(--rouge) 66.6% 100%);
    border-radius:99px;transition:width .5s ease}
  .progress-label{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:5px;font-weight:600}

  .stats{display:flex;gap:8px;margin:10px 0 12px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center}
  .stat b{display:block;font-size:1.05rem;letter-spacing:-.02em}
  .stat span{font-size:.64rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:700}

  /* ---------- Karte ---------- */
  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:340px;perspective:1200px}
  .card{position:relative;width:100%;min-height:320px;transform-style:preserve-3d;
        transition:transform .55s cubic-bezier(.2,.7,.25,1);cursor:pointer}
  .card.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
        background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
        box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;
        justify-content:center;padding:30px 22px;text-align:center;overflow:hidden}
  .face::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,var(--bleu) 0 33.3%,#fff 33.3% 66.6%,var(--rouge) 66.6% 100%);
    border-bottom:1px solid var(--line)}
  .face.back{transform:rotateY(180deg)}
  .cat-chip{font-size:.66rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    color:var(--bleu);background:#EDF0F9;border-radius:99px;padding:5px 12px;margin-bottom:16px}
  .face.back .cat-chip{color:var(--rouge);background:#FBEDEE;margin-bottom:12px}
  .word{font-size:clamp(1.3rem,5.6vw,1.9rem);font-weight:800;letter-spacing:-.02em;line-height:1.3}
  .face.back .word{color:var(--bleu-dark)}
  .hint{margin-top:16px;font-size:.74rem;color:var(--muted);font-weight:600}
  .lang-tag{position:absolute;bottom:13px;right:17px;font-size:.66rem;font-weight:800;color:var(--muted);letter-spacing:.1em}
  .new-flag{position:absolute;top:15px;left:15px;font-size:.62rem;font-weight:800;color:var(--rouge);letter-spacing:.08em}

  .phon{margin-top:10px;font-size:.98rem;font-weight:600;color:var(--rouge);
        font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;letter-spacing:.01em;line-height:1.45}
  .cog{margin-top:10px;font-size:.86rem;font-weight:800;color:#6B4FA1;
       background:#F1EDF9;border:1px solid #E0D7F2;border-radius:99px;padding:6px 14px}
  .speak-btn{margin-top:14px;display:inline-flex;align-items:center;gap:8px;
    background:#EDF0F9;color:var(--bleu-dark);border:1px solid #D6DCF0;border-radius:99px;
    padding:9px 18px;font-size:.84rem;font-weight:800;cursor:pointer;transition:transform .1s ease}
  .speak-btn:active{transform:scale(.95)}
  .speak-btn.speaking{background:var(--bleu);color:#fff;border-color:var(--bleu)}
  .phon-legend{margin-top:12px;font-size:.64rem;color:var(--muted);font-weight:600;line-height:1.4}

  /* ---------- Bewertung ---------- */
  .controls{margin-top:14px;min-height:128px}
  .reveal-btn{width:100%;padding:17px;border:none;border-radius:14px;background:var(--bleu);
    color:#fff;font-size:1.02rem;font-weight:800;cursor:pointer;
    box-shadow:0 6px 16px rgba(32,64,143,.28);transition:transform .12s ease}
  .reveal-btn:active{transform:scale(.98)}
  .grade-help{font-size:.7rem;color:var(--muted);text-align:center;margin-bottom:8px;font-weight:600}
  .grades{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .grade{border:none;border-radius:12px;padding:12px 4px;cursor:pointer;font-weight:800;color:#fff;
    font-size:.9rem;line-height:1.15;transition:transform .1s ease;
    display:flex;flex-direction:column;gap:2px;align-items:center}
  .grade small{font-weight:700;font-size:.6rem;opacity:.9}
  .grade:active{transform:scale(.96)}
  .g0{background:#B3261E}.g1{background:#C6473D}.g2{background:#D3323A}
  .g3{background:#5A6FB0}.g4{background:#2F4EA0}.g5{background:var(--bleu-dark)}

  /* ---------- Fertig-Screen ---------- */
  .done{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:32px 22px;text-align:center}
  .done h2{font-size:1.35rem;letter-spacing:-.02em;margin-bottom:10px}
  .done p{color:var(--muted);font-size:.88rem;line-height:1.5;margin-bottom:6px}
  .done .next-due{font-weight:800;color:var(--bleu);font-size:.98rem;margin:12px 0 16px}
  .ghost-btn{background:none;border:2px solid var(--bleu);color:var(--bleu);border-radius:12px;
    padding:11px 18px;font-weight:800;font-size:.88rem;cursor:pointer}

  /* ---------- Statistik-Ansicht ---------- */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
         box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
  .panel h3{font-size:.95rem;letter-spacing:-.01em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .deck-dot{width:10px;height:10px;border-radius:99px;display:inline-block}
  .mini-bar-track{height:9px;border-radius:99px;background:#ECEBE4;border:1px solid var(--line);overflow:hidden;margin:6px 0 10px}
  .mini-bar-fill{height:100%;border-radius:99px;transition:width .5s ease}
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:4px}
  .stat-cell{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:7px 3px;text-align:center}
  .stat-cell b{display:block;font-size:.95rem}
  .stat-cell span{font-size:.58rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .stat-meta{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);font-weight:700;margin-top:9px}
  .chart{display:flex;align-items:flex-end;gap:6px;height:110px;margin-top:8px}
  .chart .col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:stretch;height:100%;gap:1px}
  .chart .seg{border-radius:3px;min-height:0}
  .chart-labels{display:flex;gap:6px;margin-top:5px}
  .chart-labels span{flex:1;text-align:center;font-size:.62rem;color:var(--muted);font-weight:700}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;font-size:.66rem;font-weight:700;color:var(--muted)}
  .legend span{display:flex;align-items:center;gap:5px}

  /* ---------- Aussprache-Guide ---------- */
  .guide{overflow-y:auto}
  .guide .panel p{font-size:.86rem;line-height:1.6;color:var(--ink)}
  .guide .panel p+p{margin-top:8px}
  .guide .intro{font-size:.86rem;color:var(--muted);line-height:1.6}
  .rule-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:.82rem}
  .rule-table th{text-align:left;font-size:.64rem;text-transform:uppercase;letter-spacing:.05em;
                 color:var(--muted);padding:4px 6px;border-bottom:1px solid var(--line)}
  .rule-table td{padding:7px 6px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.45}
  .rule-table tr:last-child td{border-bottom:none}
  .fr{font-weight:800;color:var(--bleu-dark)}
  .ph{font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;color:var(--rouge);font-weight:600;font-size:.78rem}
  .tip{background:#EDF0F9;border:1px solid #D6DCF0;border-radius:10px;padding:10px 12px;
       font-size:.78rem;line-height:1.5;margin-top:10px;color:var(--bleu-dark);font-weight:600}

  /* ---------- Sicherung ---------- */
  .backup{margin-top:18px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px}
  .backup-row{display:flex;gap:8px}
  .backup-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
    border:1px solid #D6DCF0;background:#EDF0F9;color:var(--bleu-dark);border-radius:10px;
    padding:11px 6px;font-size:.8rem;font-weight:800;cursor:pointer;transition:transform .1s ease}
  .backup-btn:active{transform:scale(.97)}
  .backup-status{margin-top:8px;text-align:center;font-size:.66rem;color:var(--muted);font-weight:600;line-height:1.4}
  .backup-status.warn{color:var(--rouge)}
  .backup-warning{margin-top:14px;background:#FBEDEE;border:1px solid #F2CFD1;color:#8E2227;
    border-radius:10px;padding:10px 12px;font-size:.74rem;font-weight:700;line-height:1.4}

  /* ---------- Cloud-Sync (einklappbar) ---------- */
  .sync-box{margin-bottom:12px;padding-bottom:12px;border-bottom:1px dashed var(--line)}
  .sync-toggle{
    width:100%;display:flex;align-items:center;gap:8px;
    background:none;border:none;cursor:pointer;padding:2px 0;
    font-size:.82rem;font-weight:800;color:var(--ink);text-align:left;
  }
  .sync-toggle .sync-summary{margin-left:auto;font-size:.66rem;font-weight:700;color:var(--muted)}
  .sync-toggle .chev{font-size:.7rem;color:var(--muted);transition:transform .2s ease}
  .sync-toggle .chev.open{transform:rotate(180deg)}
  .sync-body{margin-top:10px}
  .sync-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
  .sync-head b{font-size:.82rem}
  .sync-dot{width:8px;height:8px;border-radius:99px;background:#C6C6BE}
  .sync-dot.on{background:var(--vert)}
  .sync-dot.err{background:var(--rouge)}
  .sync-code{
    display:block;width:100%;text-align:center;
    font-family:"SF Mono",ui-monospace,Menlo,Consolas,monospace;
    font-size:.78rem;font-weight:700;color:var(--bleu-dark);
    background:var(--bg);border:1px solid var(--line);border-radius:10px;
    padding:9px 8px;margin:6px 0;word-break:break-all;cursor:pointer;
  }
  .sync-status-line{font-size:.66rem;color:var(--muted);font-weight:600;text-align:center;margin-top:6px;line-height:1.4}
  .sync-status-line.err{color:var(--rouge)}
  .link-btn{background:none;border:none;color:var(--bleu);font-size:.7rem;font-weight:800;
    text-decoration:underline;cursor:pointer;padding:4px}

  .reset{margin-top:16px;text-align:center}
  .reset button{background:none;border:none;color:var(--muted);font-size:.7rem;text-decoration:underline;cursor:pointer}

  @media (prefers-reduced-motion:reduce){
    .card,.progress-fill,.mini-bar-fill{transition:none}
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand"><em>Français</em> en 7 <span class="accent">jours</span></div>
    <div class="day-badge" id="dayBadge">Tag 1 von 7</div>
  </header>

  <nav class="nav" id="nav"></nav>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label"><span id="readyLabel"></span><span id="dueLabel"></span></div>
  </div>

  <div class="stats" id="headerStats">
    <div class="stat"><b id="statDue">0</b><span>Fällig</span></div>
    <div class="stat"><b id="statNew">0</b><span>Neu heute</span></div>
    <div class="stat"><b id="statLearned">0</b><span>Gefestigt</span></div>
  </div>

  <div class="stage" id="stage"></div>
  <div class="controls" id="controls"></div>

  <div class="backup">
    <div class="sync-box">
      <button class="sync-toggle" id="syncToggle" aria-expanded="false">
        ☁️ Cloud-Sync <span class="sync-dot" id="syncDot"></span>
        <span class="sync-summary" id="syncSummary"></span>
        <span class="chev" id="syncChev">▼</span>
      </button>
      <div class="sync-body" id="syncBody" style="display:none"></div>
    </div>
    <div class="backup-row">
      <button class="backup-btn" id="exportBtn">💾 Lernstand sichern</button>
      <button class="backup-btn" id="importBtn">📂 Wiederherstellen</button>
    </div>
    <div class="backup-status" id="backupStatus"></div>
    <input type="file" id="importFile" accept=".json,application/json" style="display:none">
  </div>

  <div class="reset"><button id="resetBtn">Fortschritt zurücksetzen</button></div>
</div>

<script>
"use strict";

/* =====================================================================
   0) STAPEL-DEFINITION
===================================================================== */
const DECKS = {
  urlaub:   { label:"🎒 Urlaub",   ready:"Urlaubs-Ready",  color:"#20408F", newPerDay:30 },
  alltag:   { label:"💬 Alltag",   ready:"Alltags-Ready",  color:"#D3323A", newPerDay:20 },
  top:      { label:"⭐ Top 200",  ready:"Basis-Ready",    color:"#B07A1F", newPerDay:35 },
  kognaten: { label:"🔗 Kognaten", ready:"Transfer-Ready", color:"#6B4FA1", newPerDay:40 },
  regeln:   { label:"🔤 Regeln",   ready:"Regel-Ready",    color:"#1F7A4D", newPerDay:12 }
};

/* =====================================================================
   1) DATENBASIS
   Felder: id, french, german, phon, category, deck,
   interval (Std.), repetition, efactor (2.5), nextReviewDate (0)
===================================================================== */
function v(id, french, german, phon, category, deck){
  return { id, french, german, phon, category, deck,
           interval:0, repetition:0, efactor:2.5, nextReviewDate:0 };
}
const U  = (id,f,g,p,c) => v(id,f,g,p,c,"urlaub");
const AL = (id,f,g,p,c) => v(id,f,g,p,c,"alltag");
const T  = (id,f,g,p,c) => v(id,f,g,p,c,"top");
const R  = (id,f,g,p)   => v(id,f,g,p,"Aussprache-Regel","regeln");
/* Kognaten: cog = das fast identische Wort in einer Sprache, die du schon kannst */
const KG = (id,f,g,p,cog) => ({ ...v(id,f,g,p,"Griechisch-Brücke","kognaten"), cog });
const KE = (id,f,g,p,cog) => ({ ...v(id,f,g,p,"Englisch-Brücke","kognaten"),   cog });
const KD = (id,f,g,p,cog) => ({ ...v(id,f,g,p,"Deutsch-Brücke","kognaten"),    cog });

const SEED = [
  /* ================= STAPEL 1: URLAUB (id 1–180) ================= */
  U(1,"Bonjour","Guten Tag","bong-schur","Höflichkeit"),
  U(2,"Bonsoir","Guten Abend","bong-ßo-ar","Höflichkeit"),
  U(3,"Salut","Hallo / Tschüss (locker)","ßa-lü","Höflichkeit"),
  U(4,"Au revoir","Auf Wiedersehen","o rö-wo-ar","Höflichkeit"),
  U(5,"S'il vous plaît","Bitte (höflich)","ßil wu plä","Höflichkeit"),
  U(6,"Merci beaucoup","Vielen Dank","mär-ßi bo-ku","Höflichkeit"),
  U(7,"De rien","Gern geschehen","dö ri-äng","Höflichkeit"),
  U(8,"Excusez-moi","Entschuldigen Sie","äx-kü-se mo-a","Höflichkeit"),
  U(9,"Pardon","Verzeihung","par-dong","Höflichkeit"),
  U(10,"Oui / Non","Ja / Nein","wi / nong","Höflichkeit"),
  U(11,"Peut-être","Vielleicht","pö-tätr","Höflichkeit"),
  U(12,"Je ne comprends pas","Ich verstehe nicht","schö nö kong-prang pa","Höflichkeit"),
  U(13,"Je ne parle pas bien français","Ich spreche nicht gut Französisch","schö nö parl pa bjäng frang-ßä","Höflichkeit"),
  U(14,"Parlez-vous anglais ?","Sprechen Sie Englisch?","par-le wu ang-glä","Höflichkeit"),
  U(15,"Plus lentement, s'il vous plaît","Langsamer, bitte","plü langt-mang, ßil wu plä","Höflichkeit"),
  U(16,"Vous pouvez répéter ?","Können Sie das wiederholen?","wu pu-we re-pe-te","Höflichkeit"),
  U(17,"Comment ?","Wie bitte?","ko-mang","Höflichkeit"),
  U(18,"Ça va ?","Wie geht's?","ßa wa","Höflichkeit"),
  U(19,"Ça va bien, merci","Mir geht's gut, danke","ßa wa bjäng, mär-ßi","Höflichkeit"),
  U(20,"Enchanté","Freut mich (Kennenlernen)","ang-schang-te","Höflichkeit"),
  U(21,"Bonne journée","Schönen Tag noch","bon schur-ne","Höflichkeit"),
  U(22,"Bonne soirée","Schönen Abend noch","bon ßo-a-re","Höflichkeit"),
  U(23,"Monsieur / Madame","Herr / Frau (Anrede)","mö-ßjö / ma-dam","Höflichkeit"),
  U(24,"Je m'appelle…","Ich heiße…","schö ma-päl","Höflichkeit"),
  U(25,"Je viens d'Allemagne","Ich komme aus Deutschland","schö wjäng dal-mann-jö","Höflichkeit"),
  U(26,"Où est… ?","Wo ist…?","u ä","Basics"),
  U(27,"Quand ?","Wann?","kang","Basics"),
  U(28,"Combien ?","Wie viel?","kong-bjäng","Basics"),
  U(29,"Combien ça coûte ?","Wie viel kostet das?","kong-bjäng ßa kut","Basics"),
  U(30,"Comment ça s'appelle ?","Wie heißt das?","ko-mang ßa ßa-päl","Basics"),
  U(31,"Qu'est-ce que c'est ?","Was ist das?","käs-kö ßä","Basics"),
  U(32,"Je voudrais…","Ich hätte gern…","schö wu-drä","Basics"),
  U(33,"J'ai besoin de…","Ich brauche…","sche bö-so-äng dö","Basics"),
  U(34,"Est-ce qu'il y a… ?","Gibt es…?","äs-kil-ja","Basics"),
  U(35,"Je cherche…","Ich suche…","schö schärsch","Basics"),
  U(36,"C'est possible ?","Ist das möglich?","ßä po-ßibl","Basics"),
  U(37,"Bien sûr","Natürlich","bjäng ßür","Basics"),
  U(38,"D'accord","Einverstanden / okay","da-kor","Basics"),
  U(39,"C'est bon","Das passt / alles gut","ßä bong","Basics"),
  U(40,"Il y a…","Es gibt…","il-ja","Basics"),
  U(41,"Je sais / Je ne sais pas","Ich weiß / Ich weiß nicht","schö ßä / schö nö ßä pa","Basics"),
  U(42,"grand / petit","groß / klein","grang / pö-ti","Basics"),
  U(43,"ouvert / fermé","geöffnet / geschlossen","u-wär / fär-me","Basics"),
  U(44,"aujourd'hui","heute","o-schur-dwi","Basics"),
  U(45,"demain","morgen","dö-mäng","Basics"),
  U(46,"hier","gestern","i-är","Basics"),
  U(47,"maintenant","jetzt","mängt-nang","Basics"),
  U(48,"plus tard","später","plü tar","Basics"),
  U(49,"ici / là-bas","hier / dort","i-ßi / la-ba","Basics"),
  U(50,"avec / sans","mit / ohne","a-wäk / ßang","Basics"),
  U(51,"un, deux, trois","eins, zwei, drei","äng, dö, tro-a","Zahlen & Zeit"),
  U(52,"quatre, cinq, six","vier, fünf, sechs","katr, ßängk, ßiss","Zahlen & Zeit"),
  U(53,"sept, huit, neuf, dix","sieben, acht, neun, zehn","ßät, üit, nöf, diss","Zahlen & Zeit"),
  U(54,"onze, douze","elf, zwölf","ongs, dus","Zahlen & Zeit"),

/* =====================================================================
   2) SM-2 ALGORITHMUS (7-Tage-komprimiert)
===================================================================== */
const HOUR = 3600 * 1000;
const TOTAL_DAYS = 7;

function sm2(card, quality){
  const ef = card.efactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  card.efactor = Math.max(1.3, Math.round(ef * 100) / 100);
  if (quality >= 3) {
    card.repetition += 1;
    if      (card.repetition === 1) card.interval = 4;
    else if (card.repetition === 2) card.interval = 12;
    else if (card.repetition === 3) card.interval = 24;
    else card.interval = Math.round(card.interval * card.efactor);
  } else {
    card.repetition = 0;
    card.interval = 10 / 60;
  }
  card.nextReviewDate = Date.now() + card.interval * HOUR;
  return card;
}

/* =====================================================================
   3) TEXT-TO-SPEECH
===================================================================== */
const TTS = {
  voice: null,
  init(){
    if (!("speechSynthesis" in window)) return;
    const pick = () => {
      const voices = speechSynthesis.getVoices();
      this.voice =
        voices.find(v => v.lang === "fr-FR" && /Google|Amélie|Thomas|Audrey/i.test(v.name)) ||
        voices.find(v => v.lang === "fr-FR") ||
        voices.find(v => v.lang && v.lang.startsWith("fr")) || null;
    };
    pick();
    speechSynthesis.onvoiceschanged = pick;
  },
  speak(text, onEnd){
    if (!("speechSynthesis" in window)) { if (onEnd) onEnd(); return false; }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(String(text).replace(/…/g,"").replace(/·/g,","));
    u.lang = "fr-FR";
    if (this.voice) u.voice = this.voice;
    u.rate = 0.85; u.pitch = 1;
    if (onEnd) { u.onend = onEnd; u.onerror = onEnd; }
    speechSynthesis.speak(u);
    return true;
  }
};
TTS.init();

   4) STATE & SPEICHERUNG
===================================================================== */
const STORAGE_KEY = "fr7-vacation-trainer-v3";
let memoryFallback = null;

function dateKey(d){ d = d || new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }

function freshState(){
  const newToday = {}; Object.keys(DECKS).forEach(k => newToday[k] = 0);
  return {
    startDate: Date.now(),
    newDate: dateKey(),
    newToday,
    activeDeck: "urlaub",
    view: "learn",
    lastExport: 0,
    reviewsSinceExport: 0,
    lastChange: Date.now(),  // Zeitstempel für die Cloud-Konfliktlösung
    log: {},                 // { "2026-7-5": { urlaub:{r:12,g:9}, … } }
    cards: SEED.map(c => ({ ...c, seen:false }))
  };
}
function migrate(s){
  if (s.lastChange === undefined) s.lastChange = Date.now();
  if (!s.newToday) {
    s.newToday = {}; Object.keys(DECKS).forEach(k => s.newToday[k] = 0);
    if (typeof s.newIntroducedToday === "number") s.newToday.urlaub = s.newIntroducedToday;
  }
  if (!s.activeDeck || !DECKS[s.activeDeck]) s.activeDeck = "urlaub";
  if (!s.view) s.view = "learn";
  if (!s.log) s.log = {};
  if (s.lastExport === undefined) s.lastExport = 0;
  if (s.reviewsSinceExport === undefined) s.reviewsSinceExport = 0;
  const byId = new Map(SEED.map(c => [c.id, c]));
  const known = new Set();
  s.cards.forEach(c => {
    known.add(c.id);
    const seed = byId.get(c.id);
    if (seed) {
      if (!c.phon) c.phon = seed.phon;
      if (seed.cog && !c.cog) c.cog = seed.cog;
      if (!c.deck) c.deck = seed.deck;   // Altbestand (v1/v2) = Urlaubs-Stapel
    } else if (!c.deck) c.deck = "urlaub";
  });
  SEED.forEach(c => { if (!known.has(c.id)) s.cards.push({ ...c, seen:false }); });
  return s;
}
function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return migrate(JSON.parse(raw));
    // Migration älterer Versionen
    for (const oldKey of ["fr7-vacation-trainer-v2","fr7-vacation-trainer-v1"]) {
      const old = localStorage.getItem(oldKey);
      if (old) { const s = migrate(JSON.parse(old)); return s; }
    }
  } catch(e) { if (memoryFallback) return memoryFallback; }
  return freshState();
}
function saveState(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { memoryFallback = state; }
}
let state = loadState();
saveState();

/* =====================================================================
   5) WARTESCHLANGE (pro Stapel)
===================================================================== */
function rollover(){
  if (state.newDate !== dateKey()) {
    state.newDate = dateKey();
    Object.keys(DECKS).forEach(k => state.newToday[k] = 0);
  }
}
function deckCards(deck){ return state.cards.filter(c => c.deck === deck); }
function dueReviews(deck){
  const now = Date.now();
  return deckCards(deck).filter(c => c.seen && c.nextReviewDate <= now)
                        .sort((a,b) => a.nextReviewDate - b.nextReviewDate);
}
function newAvailable(deck){ return deckCards(deck).filter(c => !c.seen); }
function nextCard(deck){
  rollover();
  const due = dueReviews(deck);
  if (due.length) return { card: due[0], isNew:false };
  if (state.newToday[deck] < DECKS[deck].newPerDay) {
    const fresh = newAvailable(deck);
    if (fresh.length) return { card: fresh[0], isNew:true };
  }
  return null;
}

  navEl.innerHTML = html;
  navEl.querySelectorAll("[data-deck]").forEach(b => b.addEventListener("click", () => {
    state.activeDeck = b.dataset.deck; state.view = "learn"; saveState(); renderAll();
  }));
  navEl.querySelectorAll("[data-view]").forEach(b => b.addEventListener("click", () => {
    state.view = b.dataset.view; saveState(); renderAll();
  }));
}

function renderAll(){
  renderNav();
  const learn = state.view === "learn";
  document.getElementById("progressWrap").style.display = learn ? "" : "none";
  document.getElementById("headerStats").style.display  = learn ? "" : "none";
  controls.style.display = learn ? "" : "none";
  if (state.view === "stats") { renderStats(); return; }
  if (state.view === "guide") { renderGuide(); return; }
  render();
}

/* ---------- Lern-Ansicht ---------- */
function render(){
  updateHeader();
  const deck = state.activeDeck;
  current = nextCard(deck);
  flipped = false;

  if (!current) { renderDone(deck); return; }
  const c = current.card;

  stage.innerHTML = `
    <div class="card" id="card" role="button" aria-label="Karte umdrehen" tabindex="0">
      <div class="face front">
        ${current.isNew ? '<span class="new-flag">● NEU</span>' : ''}
        <span class="cat-chip">${esc(c.category)}</span>
        <div class="word">${esc(c.german)}</div>
        <div class="hint">Antwort laut sagen – dann aufdecken</div>
        <span class="lang-tag">${deck==="regeln"?"REGEL":"DE"}</span>
      </div>
      <div class="face back">
        <span class="cat-chip">${esc(c.category)}</span>
        <div class="word">${esc(c.french)}</div>
        <div class="phon">[${esc(c.phon)}]</div>
        ${c.cog ? `<div class="cog">🔗 fast wie: ${esc(c.cog)}</div>` : ""}
        <button class="speak-btn" id="speakBtn" aria-label="Aussprache anhören">🔊 Anhören</button>
        ${deck==="regeln" ? "" :
          `<div class="phon-legend">„sch" weich wie in <i>Garage</i> · Silben mit „ng" sind nasal
           (g nicht mitsprechen) · Betonung auf der letzten Silbe</div>`}
        <span class="lang-tag">FR</span>
      </div>
    </div>`;

  controls.innerHTML = `<button class="reveal-btn" id="revealBtn">Aufdecken</button>`;

  const cardEl = document.getElementById("card");
  const speakBtn = document.getElementById("speakBtn");
  const doSpeak = () => {
    speakBtn.classList.add("speaking");
    const ok = TTS.speak(c.french, () => speakBtn.classList.remove("speaking"));
    if (!ok) speakBtn.style.display = "none";
  };
  const flip = () => {
    if (flipped) return;
    flipped = true;
    cardEl.classList.add("flipped");
    showGrades();
    setTimeout(doSpeak, 350);
  };
  cardEl.addEventListener("click", flip);
  cardEl.addEventListener("keydown", e => { if (e.key==="Enter"||e.key===" "){ e.preventDefault(); flip(); }});
  document.getElementById("revealBtn").addEventListener("click", flip);
  speakBtn.addEventListener("click", e => { e.stopPropagation(); doSpeak(); });
}

function showGrades(){
  controls.innerHTML = `
    <div class="grade-help">0–2 = nicht gewusst (Karte kommt gleich wieder) · 3–5 = gewusst</div>
    <div class="grades">
      ${GRADE_LABELS.map(([n,l],q) =>
        `<button class="grade g${q}" data-q="${q}">${n}<small>${l}</small></button>`).join("")}
    </div>`;
  controls.querySelectorAll(".grade").forEach(btn =>
    btn.addEventListener("click", () => grade(parseInt(btn.dataset.q,10))));
}

function grade(q){
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  const c = current.card;
  const deck = c.deck;
  if (!c.seen) { c.seen = true; state.newToday[deck] += 1; }
  sm2(c, q);
  // Lern-Protokoll für die Statistik
  const k = dateKey();
  if (!state.log[k]) state.log[k] = {};
  if (!state.log[k][deck]) state.log[k][deck] = { r:0, g:0 };
  state.log[k][deck].r += 1;
  if (q >= 3) state.log[k][deck].g += 1;
  state.reviewsSinceExport += 1;
  state.lastChange = Date.now();
  saveState();
  SYNC.markDirty();
  renderAll();
}

function renderDone(deck){
  const cards = deckCards(deck).filter(c => c.seen).sort((a,b)=>a.nextReviewDate-b.nextReviewDate);
  const upcoming = cards[0];
  const freshLeft = newAvailable(deck).length;
  let nextTxt = "Alle Karten dieses Stapels gelernt – bravo !";
  if (upcoming) {
    const mins = Math.max(1, Math.round((upcoming.nextReviewDate - Date.now())/60000));
    nextTxt = mins < 60 ? `Nächste Wiederholung in ca. ${mins} Min.`
                        : `Nächste Wiederholung in ca. ${Math.round(mins/60)} Std.`;
  }
  stage.innerHTML = `
    <div class="done">
      <h2>Session geschafft ! 🇫🇷</h2>
      <p>Kurze Pause ist Teil des Systems: Die Abstände zwischen den
      Wiederholungen festigen dein Gedächtnis. Du kannst auch zu einem
      anderen Stapel wechseln – das ist echtes Interleaving.</p>
      <div class="next-due">${nextTxt}</div>
      ${freshLeft > 0 && state.newToday[deck] >= DECKS[deck].newPerDay
        ? `<button class="ghost-btn" id="aheadBtn">+10 neue Karten vorziehen</button>` : ``}
      ${state.reviewsSinceExport >= 25
        ? `<div class="backup-warning">💾 ${state.reviewsSinceExport} Antworten seit der letzten
           Datei-Sicherung. Jetzt unten auf „Lernstand sichern" tippen.</div>` : ``}
    </div>`;
  controls.innerHTML = "";
  const ahead = document.getElementById("aheadBtn");
  if (ahead) ahead.addEventListener("click", () => {
    state.newToday[deck] -= 10; saveState(); renderAll();
  });
}

function updateHeader(){
  rollover();
  const day = Math.min(TOTAL_DAYS, Math.floor((Date.now() - state.startDate)/(24*HOUR)) + 1);
  document.getElementById("dayBadge").textContent = `Tag ${day} von ${TOTAL_DAYS}`;
  const deck = state.activeDeck, d = DECKS[deck];
  const cards = deckCards(deck);
  const solid = cards.filter(c => c.repetition >= 2).length;
  const ready = cards.length ? Math.round((solid/cards.length)*100) : 0;
  const due = dueReviews(deck).length;
  const newLeft = Math.max(0, Math.min(d.newPerDay - state.newToday[deck], newAvailable(deck).length));
  document.getElementById("progressFill").style.width = ready + "%";
  document.getElementById("readyLabel").textContent = `${ready} % ${d.ready}`;
  document.getElementById("dueLabel").textContent = due > 0 ? due + " fällig" : "";
  document.getElementById("statDue").textContent = due;
  document.getElementById("statNew").textContent = newLeft;
  document.getElementById("statLearned").textContent = solid;
}

/* ---------- Statistik-Ansicht ---------- */
function lastNDays(n){
  const out = [];
  for (let i = n-1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    out.push({ key: dateKey(d), label: ["So","Mo","Di","Mi","Do","Fr","Sa"][d.getDay()] });
  }
  return out;
}
function renderStats(){
  let html = "";
  // Pro Stapel eine Karte
  for (const [key,d] of Object.entries(DECKS)) {
    const cards = deckCards(key);
    const total = cards.length;
    const unseen   = cards.filter(c => !c.seen).length;
    const learning = cards.filter(c => c.seen && c.repetition < 2).length;
    const solid    = cards.filter(c => c.repetition >= 2 && c.repetition < 4).length;
    const mastered = cards.filter(c => c.repetition >= 4).length;
    const ready = total ? Math.round(((solid+mastered)/total)*100) : 0;
    // Treffsicherheit aus dem Protokoll
    let r = 0, g = 0;
    Object.values(state.log).forEach(day => { if (day[key]) { r += day[key].r; g += day[key].g; } });
    const acc = r ? Math.round((g/r)*100) : null;
    const due = dueReviews(key).length;
    html += `
      <div class="panel">
        <h3><span class="deck-dot" style="background:${d.color}"></span>${d.label}
            <span style="margin-left:auto;font-size:.78rem;color:${d.color}">${ready} % ${d.ready}</span></h3>
        <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${ready}%;background:${d.color}"></div></div>
        <div class="stat-grid">
          <div class="stat-cell"><b>${unseen}</b><span>Ungesehen</span></div>
          <div class="stat-cell"><b>${learning}</b><span>Lernend</span></div>
          <div class="stat-cell"><b>${solid}</b><span>Gefestigt</span></div>
          <div class="stat-cell"><b>${mastered}</b><span>Gemeistert</span></div>
        </div>
        <div class="stat-meta">
          <span>${r} Antworten gesamt${acc !== null ? ` · ${acc} % richtig` : ""}</span>
          <span>${due} jetzt fällig</span>
        </div>
      </div>`;
  }
  // Aktivität der letzten 7 Tage (gestapelt nach Stapel-Farbe)
  const days = lastNDays(7);
  const max = Math.max(1, ...days.map(d => {
    const day = state.log[d.key] || {};
    return Object.values(day).reduce((s,x) => s + x.r, 0);
  }));
  let cols = "", labels = "";
  for (const dInfo of days) {
    const day = state.log[dInfo.key] || {};
    let segs = "";
    for (const [key,d] of Object.entries(DECKS)) {
      const rr = day[key] ? day[key].r : 0;
      if (rr > 0) segs = `<div class="seg" style="height:${(rr/max)*100}%;background:${d.color}"></div>` + segs;
    }
    cols += `<div class="col">${segs || '<div class="seg" style="height:2px;background:#ECEBE4"></div>'}</div>`;
    labels += `<span>${dInfo.label}</span>`;
  }
  html += `
    <div class="panel">
      <h3>📅 Aktivität – letzte 7 Tage</h3>
      <div class="chart">${cols}</div>
      <div class="chart-labels">${labels}</div>
      <div class="legend">
        ${Object.values(DECKS).map(d =>
          `<span><span class="deck-dot" style="background:${d.color}"></span>${d.label.replace(/^\S+\s/,"")}</span>`).join("")}
      </div>
    </div>`;
  stage.innerHTML = `<div class="guide" style="padding-top:4px">${html}</div>`;
}

/* =====================================================================
   7) CLOUD-SYNC — gleicher Lernstand auf allen Geräten
   Backend: ein PRIVATES GitHub-Gist (api.github.com, CORS-frei).
   Einmalig nötig: ein GitHub-Token mit NUR dem "gist"-Scope.
   - "Mit GitHub verbinden" sucht ein vorhandenes Lernstand-Gist unter
     deinem Konto oder legt eines an
   - Zweites Gerät: einfach DASSELBE Token einfügen – das Gist wird
     automatisch gefunden, kein Sync-Code nötig
   - Automatik: Pull beim Start, gebündelter Push nach Antworten und
     beim Verlassen der App
   - Konfliktlösung: der Stand mit dem NEUEREN lastChange gewinnt
   Hinweis: Das Token wirkt wie ein Passwort für deine Gists — nur
   selbst verwenden, niemandem schicken.
===================================================================== */
const SYNC = {
  API: "https://api.github.com",
  FILE: "fr7-lernstand.json",
  KEY: "fr7-sync-v2",
  cfg: { token:null, gistId:null, lastSync:0, collapsed:true },
  dirty: false,
  busy: false,
  lastError: null,

  init(){
    try { const raw = localStorage.getItem(this.KEY); if (raw) this.cfg = JSON.parse(raw); } catch(e) {}
    if (this.cfg.collapsed === undefined) this.cfg.collapsed = true;
    const toggle = document.getElementById("syncToggle");
    toggle.addEventListener("click", () => {
      this.cfg.collapsed = !this.cfg.collapsed;
      this.save(); this.applyCollapsed();
    });
    this.applyCollapsed();
    this.renderBox();
    if (this.ready()) this.pull();                      // beim Start: Cloud-Stand holen
    setInterval(() => this.flush(), 30000);             // gebündelter Auto-Push
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") this.flush(true);
    });
  },
  applyCollapsed(){
    document.getElementById("syncBody").style.display = this.cfg.collapsed ? "none" : "";
    document.getElementById("syncChev").classList.toggle("open", !this.cfg.collapsed);
    document.getElementById("syncToggle").setAttribute("aria-expanded", String(!this.cfg.collapsed));
  },
  save(){ try { localStorage.setItem(this.KEY, JSON.stringify(this.cfg)); } catch(e) {} },
  markDirty(){ this.dirty = true; },
  ready(){ return !!(this.cfg.token && this.cfg.gistId); },
  headers(){
    return {
      "Authorization": "Bearer " + this.cfg.token,
      "Accept": "application/vnd.github+json",
      "Content-Type": "application/json"
    };
  },
  payload(){
    return JSON.stringify({ app:"fr7-vacation-trainer", version:4, updatedAt:Date.now(), state });
  },
  fail(e){
    if (e instanceof TypeError) {
      this.lastError = "Netzwerkfehler: " + (e.message || "Verbindung fehlgeschlagen") +
        " – offline oder Content-Blocker aktiv (api.github.com freigeben).";
    } else {
      this.lastError = e && e.message ? e.message : "Unbekannter Fehler.";
    }
  },

  askToken(){
    const t = prompt(
      "GitHub-Token einfügen (beginnt mit ghp_…)\n\n" +
      "Einmalig so erstellen:\n" +
      "1. github.com → Profilbild → Settings\n" +
      "2. Ganz unten: Developer settings\n" +
      "3. Personal access tokens → Tokens (classic)\n" +
      "4. Generate new token (classic)\n" +
      "5. Haken NUR bei „gist\" setzen, Ablauf z. B. 1 Jahr\n" +
      "6. Generate token → Token kopieren und hier einfügen"
    );
    return t ? t.trim() : null;
  },

  async enable(){
    if (this.busy) return;
    const token = this.askToken();
    if (!token) return;
    this.busy = true; this.lastError = null; this.renderBox("Verbinde mit GitHub…");
    try {
      this.cfg.token = token;
      // 1) Gibt es unter diesem Konto schon einen Lernstand (z. B. vom anderen Gerät)?
      const found = await this.findGist();
      if (found) {
        this.cfg.gistId = found.id; this.save();
        await this.pullInner();                          // Abgleich (neuerer Stand gewinnt)
      } else {
        // 2) Neues PRIVATES Gist anlegen
        const res = await fetch(this.API + "/gists", {
          method:"POST", headers: this.headers(),
          body: JSON.stringify({
            description: "Französisch-Trainer – Lernstand (automatisch verwaltet)",
            public: false,
            files: { [this.FILE]: { content: this.payload() } }
          })
        });
        if (res.status === 401) throw new Error("Token ungültig oder abgelaufen (HTTP 401).");
        if (res.status === 403) throw new Error("Token hat nicht den „gist\"-Scope (HTTP 403) – beim Erstellen den Haken bei „gist\" setzen.");
        if (!res.ok) throw new Error("GitHub antwortet mit HTTP " + res.status);
        const gist = await res.json();
        this.cfg.gistId = gist.id;
        this.dirty = false;
      }
      this.cfg.lastSync = Date.now(); this.save();
    } catch(e) {
      this.fail(e);
      if (!this.cfg.gistId) this.cfg.token = null;       // halbe Einrichtung nicht speichern
      this.save();
    }
    this.busy = false; this.renderBox();
  },

  async findGist(){
    const res = await fetch(this.API + "/gists?per_page=100", { headers: this.headers() });
    if (res.status === 401) throw new Error("Token ungültig oder abgelaufen (HTTP 401).");
    if (!res.ok) throw new Error("GitHub antwortet mit HTTP " + res.status);
    const list = await res.json();
    return (Array.isArray(list) ? list : []).find(g => g.files && g.files[this.FILE]) || null;
  },

  async pullInner(){
    const res = await fetch(this.API + "/gists/" + this.cfg.gistId, { headers: this.headers() });
    if (res.status === 404) throw new Error("Das Lernstand-Gist existiert nicht mehr (gelöscht?). Sync trennen und neu verbinden.");
    if (res.status === 401) throw new Error("Token ungültig oder abgelaufen (HTTP 401).");
    if (!res.ok) throw new Error("GitHub antwortet mit HTTP " + res.status);
    const gist = await res.json();
    const f = gist.files && gist.files[this.FILE];
    if (!f) throw new Error("Im Gist fehlt die Datei " + this.FILE);
    let text = f.content;
    if (f.truncated && f.raw_url) {                      // Sicherheitsnetz bei sehr großen Ständen
      const raw = await fetch(f.raw_url);
      text = await raw.text();
    }
    const remote = JSON.parse(text);
    this.adoptIfNewer(remote);
  },

  adoptIfNewer(remote){
    const remoteChange = (remote && remote.state && remote.state.lastChange) || (remote && remote.updatedAt) || 0;
    if (remote && remote.state && Array.isArray(remote.state.cards) && remoteChange > (state.lastChange || 0)) {
      state = migrate(remote.state);
      saveState(); renderAll(); updateBackupStatus();
    } else if ((state.lastChange || 0) > remoteChange) {
      this.dirty = true;                                  // lokal ist neuer → hochladen
    }
  },

  async pull(){
    if (!this.ready() || this.busy) return;
    this.busy = true; this.renderBox("Synchronisiere…");
    try {
      await this.pullInner();
      this.cfg.lastSync = Date.now(); this.save(); this.lastError = null;
    } catch(e) { this.fail(e); }
    this.busy = false; this.renderBox();
    if (this.dirty) this.flush();
  },

  async flush(useKeepalive){
    if (!this.ready() || !this.dirty || this.busy) return;
    this.busy = true;
    try {
      const res = await fetch(this.API + "/gists/" + this.cfg.gistId, {
        method:"PATCH", headers: this.headers(),
        body: JSON.stringify({ files: { [this.FILE]: { content: this.payload() } } }),
        keepalive: !!useKeepalive
      });
      if (res.status === 401) throw new Error("Token ungültig oder abgelaufen (HTTP 401).");
      if (!res.ok) throw new Error("Upload fehlgeschlagen (HTTP " + res.status + ") – wird automatisch erneut versucht.");
      this.dirty = false; this.cfg.lastSync = Date.now(); this.save(); this.lastError = null;
    } catch(e) { this.fail(e); }
    this.busy = false; this.renderBox();
  },

  unlink(){
    if (!confirm("Cloud-Sync auf DIESEM Gerät trennen? (Das Gist bei GitHub und andere Geräte bleiben unberührt.)")) return;
    this.cfg = { token:null, gistId:null, lastSync:0, collapsed:this.cfg.collapsed };
    this.save(); this.lastError = null; this.renderBox();
  },

  renderBox(statusOverride){
    const body = document.getElementById("syncBody");
    const dot = document.getElementById("syncDot");
    const summary = document.getElementById("syncSummary");
    if (!body) return;

    dot.className = "sync-dot " + (this.lastError ? "err" : this.ready() ? "on" : "");
    summary.textContent = this.lastError ? "Fehler" : this.ready() ? "aktiv" : "aus";

    if (!this.ready()) {
      body.innerHTML = `
        <div class="backup-row">
          <button class="backup-btn" id="syncEnableBtn">🐙 Mit GitHub verbinden</button>
        </div>
        <div class="sync-status-line ${this.lastError?"err":""}">${statusOverride || this.lastError ||
          "Gleicher Lernstand auf iPhone, PC & Co. – gespeichert in einem privaten GitHub-Gist. " +
          "Du brauchst nur dein GitHub-Konto und einmalig ein Token (Anleitung erscheint beim Verbinden)."}</div>`;
      document.getElementById("syncEnableBtn").addEventListener("click", () => this.enable());
    } else {
      const mins = this.cfg.lastSync ? Math.round((Date.now()-this.cfg.lastSync)/60000) : null;
      const when = mins === null ? "–" : mins < 1 ? "gerade eben" :
                   mins < 60 ? `vor ${mins} Min.` : `vor ${Math.round(mins/60)} Std.`;
      summary.textContent = this.lastError ? "Fehler" : `synchron · ${when}`;
      body.innerHTML = `
        <span class="sync-code" title="Gist-ID (nur zur Info)">Gist: ${esc(this.cfg.gistId)}</span>
        <div class="backup-row">
          <button class="backup-btn" id="syncNowBtn">🔄 Jetzt synchronisieren</button>
          <button class="backup-btn" id="syncUnlinkBtn">✂️ Trennen</button>
        </div>
        <div class="sync-status-line ${this.lastError?"err":""}">${statusOverride || this.lastError ||
          `Zuletzt synchronisiert: ${when} · Anderes Gerät koppeln: dort „Mit GitHub verbinden" tippen
           und DASSELBE Token einfügen – der Lernstand wird automatisch gefunden.`}</div>`;
      document.getElementById("syncNowBtn").addEventListener("click", async () => { this.dirty = true; await this.flush(); await this.pull(); });
      document.getElementById("syncUnlinkBtn").addEventListener("click", () => this.unlink());
    }
  }
};

/* =====================================================================
   8) DATEI-SICHERUNG
===================================================================== */
const exportBtn = document.getElementById("exportBtn");
const importBtn = document.getElementById("importBtn");
const importFile = document.getElementById("importFile");
const backupStatus = document.getElementById("backupStatus");

function backupFilename(){
  const d = new Date(); const p = n => String(n).padStart(2,"0");
  return `franzoesisch-lernstand-${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}.json`;
}
async function exportState(){
  const payload = JSON.stringify({ app:"fr7-vacation-trainer", version:3, exportedAt:Date.now(), state }, null, 2);
  const file = new File([payload], backupFilename(), { type:"application/json" });
  let saved = false;
  if (navigator.canShare && navigator.canShare({ files:[file] })) {
    try { await navigator.share({ files:[file], title:"Französisch-Lernstand" }); saved = true; }
    catch(e) {}
  }
  if (!saved) {
    const url = URL.createObjectURL(new Blob([payload], { type:"application/json" }));
    const a = document.createElement("a");
    a.href = url; a.download = backupFilename();
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
    saved = true;
  }
  if (saved) {
    state.lastExport = Date.now(); state.reviewsSinceExport = 0;
    saveState(); updateBackupStatus();
  }
}
function importState(file){
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const s = data.state || data;
      if (!s || !Array.isArray(s.cards) || !s.cards.every(c => typeof c.id === "number" && "efactor" in c)) {
        alert("Diese Datei ist keine gültige Lernstand-Sicherung."); return;
      }
      if (!confirm("Gespeicherten Lernstand laden? Der aktuelle Fortschritt auf diesem Gerät wird ersetzt.")) return;
      state = migrate(s);
      state.lastChange = Date.now();
      saveState(); SYNC.markDirty(); SYNC.flush();
      renderAll(); updateBackupStatus();
      alert("Lernstand erfolgreich wiederhergestellt ✔");
    } catch(e) { alert("Die Datei konnte nicht gelesen werden."); }
  };
  reader.readAsText(file);
}
function updateBackupStatus(){
  const stale = state.reviewsSinceExport >= 25 ||
    (state.lastExport > 0 && Date.now() - state.lastExport > 24*HOUR && state.reviewsSinceExport > 0);
  if (!state.lastExport) {
    backupStatus.textContent = "Fortschritt wird automatisch im Browser gespeichert. Tipp: Zusätzlich als Datei sichern.";
    backupStatus.className = "backup-status" + (state.reviewsSinceExport >= 25 ? " warn" : "");
  } else {
    const mins = Math.round((Date.now() - state.lastExport)/60000);
    const when = mins < 60 ? `vor ${Math.max(1,mins)} Min.` :
                 mins < 1440 ? `vor ${Math.round(mins/60)} Std.` : `vor ${Math.round(mins/1440)} Tag(en)`;
    backupStatus.textContent = `Automatisch gespeichert · Letzte Datei-Sicherung: ${when}` +
      (stale ? " – Zeit für eine neue Sicherung!" : "");
    backupStatus.className = "backup-status" + (stale ? " warn" : "");
  }
}
exportBtn.addEventListener("click", exportState);
importBtn.addEventListener("click", () => importFile.click());
importFile.addEventListener("change", () => {
  if (importFile.files && importFile.files[0]) importState(importFile.files[0]);
  importFile.value = "";
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Wirklich den GESAMTEN Lernfortschritt aller Stapel löschen?")) {
    state = freshState(); saveState();
    SYNC.markDirty(); SYNC.flush();
    renderAll(); updateBackupStatus();
  }
});

setInterval(() => {
  if (state.view === "learn" && !current) renderAll();
  else if (state.view === "learn") { updateHeader(); renderNav(); }
  updateBackupStatus();
}, 30000);

renderAll();
updateBackupStatus();
SYNC.init();
</script>
